
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Lender - Loan Eligibility Predictor</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

    <div class="card">

        <h1>🏦 Smart Lender</h1>

        <p class="subtitle">
            AI-Based Loan Eligibility Prediction System
        </p>

        <form action="/predict" method="POST">

            <label for="gender">Gender</label>
            <select id="gender" name="gender" required>
                <option value="" disabled selected>Select Gender</option>
                <option value="Male">Male</option>
                <option value="Female">Female</option>
            </select>

            <label for="married">Marital Status</label>
            <select id="married" name="married" required>
                <option value="" disabled selected>Select Status</option>
                <option value="Yes">Married</option>
                <option value="No">Unmarried</option>
            </select>

            <label for="dependents">Number of Dependents</label>
            <input
                type="number"
                id="dependents"
                name="dependents"
                min="0"
                max="5"
                placeholder="Enter dependents"
                required
            >

            <label for="education">Education</label>
            <select id="education" name="education" required>
                <option value="" disabled selected>Select Education</option>
                <option value="Graduate">Graduate</option>
                <option value="Not Graduate">Not Graduate</option>
            </select>

            <label for="self_employed">Self Employed</label>
            <select id="self_employed" name="self_employed" required>
                <option value="" disabled selected>Select Option</option>
                <option value="Yes">Yes</option>
                <option value="No">No</option>
            </select>

            <label for="applicant_income">Applicant Income</label>
            <input
                type="number"
                id="applicant_income"
                name="applicant_income"
                placeholder="Enter applicant income"
                required
            >

            <label for="coapplicant_income">Co-applicant Income</label>
            <input
                type="number"
                id="coapplicant_income"
                name="coapplicant_income"
                placeholder="Enter co-applicant income"
                required
            >

            <label for="loan_amount">Loan Amount</label>
            <input
                type="number"
                id="loan_amount"
                name="loan_amount"
                placeholder="Enter loan amount"
                required
            >

            <label for="loan_term">Loan Term (Months)</label>
            <input
                type="number"
                id="loan_term"
                name="loan_term"
                placeholder="Enter loan term"
                required
            >

            <label for="credit_history">Credit History</label>
            <select id="credit_history" name="credit_history" required>
                <option value="" disabled selected>Select Credit Status</option>
                <option value="1">Good</option>
                <option value="0">Bad</option>
            </select>

            <label for="property_area">Property Area</label>
            <select id="property_area" name="property_area" required>
                <option value="" disabled selected>Select Area</option>
                <option value="Urban">Urban</option>
                <option value="Semiurban">Semi Urban</option>
                <option value="Rural">Rural</option>
            </select>

            <button type="submit">
                🔍 Check Loan Eligibility
            </button>

        </form>

        {% if prediction_text %}
        <div class="result">
            <h2>{{ prediction_text }}</h2>
        </div>
        {% endif %}

    </div>

    <div class="top-home">
    <a href="/">
        <button type="button" class="home-btn">🏠 Back to Home</button>
    </a>
    </div>

</div>

<footer>
    © 2026 Smart Lender | Machine Learning Loan Prediction System
</footer>

</body>
</html>
