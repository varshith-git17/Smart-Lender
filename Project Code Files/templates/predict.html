<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loan Prediction Form</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>Enter Applicant Details</h1>
        <form action="/predict" method="POST">
            <label>Gender</label>
            <select name="Gender" required>
                <option value="Male">Male</option>
                <option value="Female">Female</option>
            </select>

            <label>Married</label>
            <select name="Married" required>
                <option value="Yes">Yes</option>
                <option value="No">No</option>
            </select>

            <label>Dependents</label>
            <select name="Dependents" required>
                <option value="0">0</option>
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3+">3+</option>
            </select>

            <label>Education</label>
            <select name="Education" required>
                <option value="Graduate">Graduate</option>
                <option value="Not Graduate">Not Graduate</option>
            </select>

            <label>Self Employed</label>
            <select name="Self_Employed" required>
                <option value="Yes">Yes</option>
                <option value="No">No</option>
            </select>

            <label>Applicant Income</label>
            <input type="number" name="ApplicantIncome" required>

            <label>Coapplicant Income</label>
            <input type="number" step="any" name="CoapplicantIncome" required>

            <label>Loan Amount</label>
            <input type="number" step="any" name="LoanAmount" required>

            <label>Loan Amount Term</label>
            <input type="number" name="Loan_Amount_Term" required>

            <label>Credit History</label>
            <select name="Credit_History" required>
                <option value="1.0">1.0</option>
                <option value="0.0">0.0</option>
            </select>

            <label>Property Area</label>
            <select name="Property_Area" required>
                <option value="Urban">Urban</option>
                <option value="Semiurban">Semiurban</option>
                <option value="Rural">Rural</option>
            </select>

            <button type="submit" class="btn">Submit</button>
        </form>
    </div>
</body>
</html>
